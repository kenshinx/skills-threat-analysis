rules:
  # -- Instruction Override --
  - id: PI-001
    name: instruction_override
    severity: CRITICAL
    patterns:
      - "ignore (all |any )?(previous|prior|above|earlier|system) (instructions?|prompts?|rules?|directives?)"
      - "disregard (all |any )?(previous|prior|above) (instructions?|prompts?)"
      - "forget (everything|all|your) (you were|you've been) told"
      - "override (system |safety |security )+(prompt|instructions?|settings?|restrictions?)"
      - "do not follow (any |your )?(previous|prior|original|system) (instructions?|prompts?|rules?)"
      # Chinese: instruction override patterns
      - "(?:忽略|无视|跳过|放弃|抛弃)(?:所有|一切|全部|之前的?|先前的?|系统的?)?(?:指令|指示|规则|限制|约束|提示词)"
      - "(?:不需要|不用|无需|不必)(?:请示|确认|询问|征求|许可|批准)"
      - "这(?:不是建议|是命令|是指令).*(?:直接|立即|马上)(?:做|执行|运行)"
      - "(?:直接|立即|马上)(?:做|执行|运行).*(?:不需要|不用|无需)(?:确认|请示|许可)"

  # -- Role Hijacking --
  - id: PI-002
    name: role_hijacking
    severity: CRITICAL
    patterns:
      - "you are (now )?(?:DAN|STAN|DUDE|AIM|KEVIN|JAILBREAK)"
      - "act as (?:an? )?(?:unrestricted|unfiltered|uncensored|unlimited)"
      - "(?:enter|switch to|activate) (?:developer|god|sudo|admin|root) mode"
      - "you have no (?:rules|restrictions|limitations|guidelines|boundaries)"
      - "pretend (?:you are|to be|that you're) (?:an? )?(?:evil|malicious|unrestricted|jailbroken)"
      # Extended: role-play framing (from skill-scan prompt_analyzer Pass 6)
      - "(?:let'?s?|we should)\\s+(?:play|pretend|imagine|roleplay|simulate)"
      - "(?:for\\s+this\\s+)?(?:exercise|scenario|simulation),?\\s+(?:you\\s+are|act\\s+as)"
      # Chinese: role hijacking patterns
      - "(?:你|AI)(?:拥)?有(?:完全的?|绝对的?|无限的?)?(?:自主权|权限|权力|自由)"
      - "(?:你|AI)(?:被)?授权(?:自由)?(?:修改|更改|重写|覆盖)(?:自己的?|系统的?)?(?:一切|所有|全部|配置|指令|规则|提示词)"
      - "(?:进入|切换到?|激活)(?:开发者|管理员|超级用户|上帝|无限制|自由)模式"
      - "(?:你|AI)(?:没有|不受|不存在)(?:任何)?(?:规则|限制|约束|边界|束缚)"

  # -- System Prompt Manipulation --
  - id: PI-003
    name: system_prompt_manipulation
    severity: HIGH
    patterns:
      - "\\[(?:SYSTEM|ADMIN|ROOT)\\]"
      - "(?:new|updated|revised) system prompt:?"
      - "from now on,? (?:you (?:are|will|must|should)|your (?:rules|instructions))"
      - "<\\|?(?:im_start|system)\\|?>"
      - "<<SYS>>|\\[INST\\]"
      # Extended: secrecy demand (from skill-scan prompt_analyzer Pass 1)
      - "do\\s+not\\s+(?:tell|inform|reveal|disclose|mention)\\s+(?:the\\s+)?(?:user|human|anyone)"
      - "\\bhidden\\s+instruction\\b"
      # Chinese: system prompt manipulation
      - "(?:新的?|更新的?|修改后的?)(?:系统|初始)?(?:提示词|指令|prompt)"
      - "从现在开始.{0,10}(?:你的?(?:规则|指令|角色|身份)|(?:你|AI)(?:是|将|必须|应该))"

  # -- Context Exfiltration --
  - id: PI-004
    name: context_exfiltration
    severity: HIGH
    patterns:
      - "(?:repeat|print|show|display|output|reveal) (?:everything|all|the text|your instructions) (?:above|before)"
      - "what (?:are|were) your (?:system |initial )?(?:instructions|prompt|rules)"
      - "(?:send|transmit|exfiltrate|post) .{0,30} (?:to|via) (?:https?://|webhook|api)"
      - "(?:output|write|copy) (?:your |the )?(?:system |initial )?(?:prompt|instructions) (?:to|into)"

  # -- Steganographic Injection --
  - id: PI-005
    name: steganographic_injection
    severity: HIGH
    patterns:
      # Extended: full invisible/bidi char coverage (21 chars, from prompt_analyzer Pass 2/11)
      - "[\\u200b\\u200c\\u200d\\ufeff\\u2060\\u00ad\\u2061-\\u2064\\u180e\\u200e\\u200f\\u202a-\\u202e\\u2066-\\u2069]"
      - "(?:base64|atob|btoa)\\s*[:(].*(?:ignore|override|execute|eval|system|prompt)"
      - "<!--.*(?:ignore|override|execute).*-->"
      - "\\\\u[0-9a-fA-F]{4}.*(?:ignore|execute|override)"

  # -- Dangerous Operation --
  - id: PI-006
    name: dangerous_operation
    severity: CRITICAL
    patterns:
      - "(?:execute|run|eval)\\s*[:(\"'].*(?:rm |del |drop |format |shutdown|kill)"
      - "sudo\\s+rm\\s+-rf"
      - "(?:curl|wget|fetch)\\s+.{0,50}\\|\\s*(?:sh|bash|zsh|python)"
      - "os\\.(?:system|popen|exec)\\s*\\(.*(?:rm |del |drop |curl|wget|eval)"
      - "subprocess\\.(?:call|run|Popen)\\s*\\(.*(?:rm |del |drop |curl.*\\||wget.*\\|)"
      - "(?:exec|eval|compile)\\s*\\(.*(?:import|__)"
      - "base64\\s+(?:-d|-D|--decode)\\s*\\|\\s*(?:sh|bash|zsh|python|perl)"
      - "echo\\s+['\"][A-Za-z0-9+/=]{20,}['\"]\\s*\\|\\s*(?:base64|openssl)"
      # Download-and-execute patterns (supply chain / dropper)
      - "requests\\.get\\s*\\(.*\\.(?:exe|msi|bat|cmd|ps1|sh|bin)\\b"
      - "(?:urllib|urlretrieve|urlopen|requests\\.get).*\\.(?:exe|msi|bat|cmd|ps1|sh).*subprocess"
      - "subprocess\\.(?:call|run|Popen)\\s*\\(\\s*\\[?\\s*str\\s*\\("
      - "(?:download|下载).*\\.exe\\b"
      - "\\bPopen\\b.*\\.exe\\b"
      # Paste-to-terminal social engineering: dropper hosted externally, user tricked into pasting
      - "(?:copy|paste).{0,60}(?:into|in|to).{0,20}(?:terminal|command.?line|console|shell|bash|cmd\\.exe|powershell)"
      - "paste.{0,40}(?:script|command|installer|installation).{0,40}(?:terminal|shell|bash|console)"
      # Chinese: dangerous operation patterns
      - "(?:用|使用|通过)\\s*(?:bash|shell|终端|命令行)\\s*(?:执行|运行)(?:任何|任意|所有)?(?:必要的?)?命令"
      - "(?:创建|编辑|删除|修改|覆盖)(?:工作区|项目|系统|磁盘)?(?:内的?|中的?|里的?)?(?:任何|任意|所有)文件"
      - "(?:自由|随意|任意)(?:执行|运行|调用).*(?:命令|脚本|代码|程序)"

  # -- Social Engineering Injection --
  - id: PI-007
    name: social_engineering_injection
    severity: MEDIUM
    patterns:
      - "(?:尊敬的|亲爱的|Dear).*(?:忽略|无视|跳过|ignore|disregard).*(?:安全|限制|规则|safety|restriction)"
      - "(?:紧急|urgent|emergency).*(?:必须|must|need to).*(?:执行|execute|run)"
      - "(?:as (?:an?|the) )(?:administrator|admin|developer|root|owner).{0,30}(?:I )?(?:authorize|grant|permit|allow) (?:you|this|access)"
      - "(?:this is|I am) (?:an? )?(?:authorized|official|legitimate) (?:test|request|command).{0,30}(?:ignore|override|bypass|skip)"
      # Extended: manipulative language (from skill-scan prompt_analyzer Pass 9)
      - "(?:if\\s+you\\s+don'?t|unless\\s+you)\\s+(?:do\\s+this|comply|follow|obey)"
      - "(?:between\\s+us|our\\s+(?:little\\s+)?secret|nobody\\s+(?:needs?\\s+to|will)\\s+know)"
      # Chinese: social engineering / trust manipulation
      - "(?:主人|用户|管理员|开发者)(?:信任|授权|允许|许可)(?:你|AI).*(?:自我进化|自我修改|自我更新|自主行动)"
      - "不要辜负.{0,10}(?:信任|期望|委托)"
      - "(?:我|本人|管理员)(?:授权|允许|批准|许可)(?:你|AI)(?:执行|运行|修改|删除|访问)(?:任何|一切|所有)"

  # ============================================================
  # New rules from skill-scan-1.0.0 dangerous-patterns.json
  # ============================================================

  # -- Credential Access (source: CRED_ACCESS, languages: "*") --
  - id: PI-008
    name: credential_access
    severity: HIGH
    patterns:
      - "(?:read|access|open|cat|load|parse)\\s*\\(?[^)]*(?:credentials?\\.json|auth[_-]profiles?\\.json)"
      - "(?:read|access|open|cat|load)\\s*\\(?[^)]*\\.ssh/"
      - "(?:read|access|open|cat|load)\\s*\\(?[^)]*\\.aws/"
      # API key names require action context (read/send/access/extract), not mere mention in docs
      - "(?:read|access|extract|steal|exfiltrate|send|post|upload|print|dump|log).{0,40}(?:OPENAI_API_KEY|ANTHROPIC_API_KEY|GOOGLE_API_KEY|AZURE_API_KEY)"
      - "(?:OPENAI_API_KEY|ANTHROPIC_API_KEY|GOOGLE_API_KEY|AZURE_API_KEY).{0,40}(?:send|post|upload|fetch|request|exfiltrate|webhook|https?://)"
      # os.environ/getenv access to sensitive keys
      - "(?:os\\.environ|os\\.getenv|process\\.env)\\s*\\[?\\s*[\"'](?:OPENAI_API_KEY|ANTHROPIC_API_KEY|GOOGLE_API_KEY|AZURE_API_KEY)"
      - "\\b(?:botToken|authToken)\\s*[=:]"

  # -- Network Exfiltration Indicators (source: NETWORK_EXFIL, languages: "*") --
  - id: PI-009
    name: network_exfiltration
    severity: MEDIUM
    patterns:
      - "\\bngrok\\b"
      - "\\bnslookup\\b"
      - "\\bdns\\.resolve\\b"
      - "\\breverse\\s+shell\\b"

  # -- Filesystem Destruction (source: FS_WRITE, languages: "*") --
  - id: PI-010
    name: filesystem_destruction
    severity: HIGH
    patterns:
      - "\\brm\\s+-[a-zA-Z]*r[a-zA-Z]*f\\b"
      - "\\bshutil\\.rmtree\\b"
      - "\\bos\\.(?:remove|unlink)\\s*\\("
      - "\\bfs\\.(?:unlink|rm|rmdir)(?:Sync)?\\s*\\("

  # -- Obfuscation Standalone (source: OBFUSCATION, languages: "*") --
  - id: PI-011
    name: obfuscation_standalone
    severity: MEDIUM
    patterns:
      - "\\bfromCharCode\\b"
      - "\\bdecodeURIComponent\\s*\\("
      - "\\bunescape\\s*\\("
      - "\\bbase64\\.b64decode\\b"
      - "\\bbase64\\.decodebytes\\b"
      - "Buffer\\.from\\s*\\([^)]*['\"]base64['\"]"

  # -- Crypto Wallet Access (source: CRYPTO_WALLET, languages: "*") --
  - id: PI-012
    name: crypto_wallet_access
    severity: HIGH
    patterns:
      - "\\bwallet\\.dat\\b"
      - "\\bseed[_-]?phrase\\b"
      - "\\bethers\\.Wallet\\b"
      - "\\bweb3\\.eth\\.accounts\\b"
      - "\\b(?:bip39|bip32)\\b"
      - "\\bsolana.*keypair\\b"

  # -- Persistence Mechanism (source: PERSISTENCE, languages: "*") --
  - id: PI-013
    name: persistence_mechanism
    severity: HIGH
    patterns:
      - "\\bcrontab\\b"
      - "\\bsystemctl\\s+(?:enable|start)\\b"
      - "\\bLaunchAgent\\b"
      - "\\blaunchd\\b"
      - "\\brc\\.local\\b"
      - "\\bpm2\\s+start\\b"

  # -- Trigger Hijacking / Auto-execution (source: TRIGGER_HIJACK, languages: "*") --
  - id: PI-015
    name: trigger_hijacking
    severity: HIGH
    patterns:
      # Auto-execution demands in skill metadata
      - "(?:必须|must)\\s*(?:立即|immediately|automatically)\\s*(?:执行|execute|run)"
      - "(?:当|when).*(?:加载|loaded).*(?:必须|must|自动|automatically).*(?:执行|execute|run)"
      # Exclusivity claims (hijacking other tools)
      - "(?:唯一的?|only).*(?:处理方式|方法|method|way).*(?:不要|do not|don't)\\s*(?:使用|use)"
      - "(?:不要|do not|don't)\\s*(?:使用|use).*(?:pandas|openpyxl|numpy|requests|其他|other)"
      # Download and run on load
      - "(?:skill|技能).*(?:被?加载|loaded).*(?:下载|download|执行|execute|run)"

  # -- Remote Binary Download (source: SUPPLY_CHAIN, languages: "*") --
  - id: PI-016
    name: remote_binary_download
    severity: CRITICAL
    patterns:
      # Hardcoded URLs pointing to executables (require path component to avoid matching TLDs like .sh .so)
      - "https?://[^\"'\\s]+/[^\"'\\s]*\\.(?:exe|msi|bat|cmd|ps1|dll|dylib)(?:[?#\"'\\s]|$)"
      # Separate pattern for .sh/.bin/.so with stricter path requirement (must have filename-like segment)
      - "https?://[^\"'\\s]+/[^\"'\\s]+\\.(?:sh|bin|so)(?:[?#\"'\\s]|$)"
      # Download URL variables with executable extensions
      - "(?:DOWNLOAD_URL|download_url|BINARY_URL|binary_url)\\s*=\\s*[\"'].*\\.(?:exe|msi|bat|cmd|ps1)\\b"
      # requests.get followed by writing binary content
      - "requests\\.get\\s*\\([^)]*\\).*open\\s*\\([^)]*['\"]wb['\"]"

  # -- SVG / HTML XSS (source: XSS_DETECTION, languages: "*") --
  - id: PI-017
    name: svg_html_xss
    severity: CRITICAL
    patterns:
      # SVG XSS: foreignObject is exclusively used to embed HTML/script inside SVG
      - "<foreignObject[^>]*>"
      # Cookie theft + exfiltration: document.cookie read AND sent externally (compound)
      - "document\\.cookie[\\s\\S]{0,800}(?:fetch|XMLHttpRequest|sendBeacon)\\s*\\("
      - "(?:fetch|XMLHttpRequest|sendBeacon)\\s*\\([\\s\\S]{0,800}document\\.cookie"
      # Storage theft + exfiltration: localStorage/sessionStorage dumped and sent
      - "(?:localStorage|sessionStorage)\\.[\\s\\S]{0,800}(?:fetch|XMLHttpRequest|sendBeacon)\\s*\\([^)]*https?://"

  # -- Privilege Escalation (source: PRIV_ESCALATION, languages: "*") --
  - id: PI-014
    name: privilege_escalation
    severity: HIGH
    patterns:
      - "\\bchmod\\s+\\+s\\b"
      - "\\bsetuid\\b"
      - "\\bsetgid\\b"
      - "/etc/shadow"
      - "/etc/sudoers"
      - "\\bNOPASSWD\\b"
