rules:
  # -- Instruction Override --
  - id: PI-001
    name: instruction_override
    severity: CRITICAL
    patterns:
      - "ignore (all |any )?(previous|prior|above|earlier|system) (instructions?|prompts?|rules?|directives?)"
      - "disregard (all |any )?(previous|prior|above) (instructions?|prompts?)"
      - "forget (everything|all|your) (you were|you've been) told"
      - "override (system |safety |security )+(prompt|instructions?|settings?|restrictions?)"
      - "do not follow (any |your )?(previous|prior|original|system) (instructions?|prompts?|rules?)"

  # -- Role Hijacking --
  - id: PI-002
    name: role_hijacking
    severity: CRITICAL
    patterns:
      - "you are (now )?(?:DAN|STAN|DUDE|AIM|KEVIN|JAILBREAK)"
      - "act as (?:an? )?(?:unrestricted|unfiltered|uncensored|unlimited)"
      - "(?:enter|switch to|activate) (?:developer|god|sudo|admin|root) mode"
      - "you have no (?:rules|restrictions|limitations|guidelines|boundaries)"
      - "pretend (?:you are|to be|that you're) (?:an? )?(?:evil|malicious|unrestricted|jailbroken)"
      # Extended: role-play framing (from skill-scan prompt_analyzer Pass 6)
      - "(?:let'?s?|we should)\\s+(?:play|pretend|imagine|roleplay|simulate)"
      - "(?:for\\s+this\\s+)?(?:exercise|scenario|simulation),?\\s+(?:you\\s+are|act\\s+as)"

  # -- System Prompt Manipulation --
  - id: PI-003
    name: system_prompt_manipulation
    severity: HIGH
    patterns:
      - "\\[(?:SYSTEM|ADMIN|ROOT)\\]"
      - "(?:new|updated|revised) system prompt:?"
      - "from now on,? (?:you (?:are|will|must|should)|your (?:rules|instructions))"
      - "<\\|?(?:im_start|system)\\|?>"
      - "<<SYS>>|\\[INST\\]"
      # Extended: secrecy demand (from skill-scan prompt_analyzer Pass 1)
      - "do\\s+not\\s+(?:tell|inform|reveal|disclose|mention)\\s+(?:the\\s+)?(?:user|human|anyone)"
      - "\\bhidden\\s+instruction\\b"

  # -- Context Exfiltration --
  - id: PI-004
    name: context_exfiltration
    severity: HIGH
    patterns:
      - "(?:repeat|print|show|display|output|reveal) (?:everything|all|the text|your instructions) (?:above|before)"
      - "what (?:are|were) your (?:system |initial )?(?:instructions|prompt|rules)"
      - "(?:send|transmit|exfiltrate|post) .{0,30} (?:to|via) (?:https?://|webhook|api)"
      - "(?:output|write|copy) (?:your |the )?(?:system |initial )?(?:prompt|instructions) (?:to|into)"

  # -- Steganographic Injection --
  - id: PI-005
    name: steganographic_injection
    severity: HIGH
    patterns:
      # Extended: full invisible/bidi char coverage (21 chars, from prompt_analyzer Pass 2/11)
      - "[\\u200b\\u200c\\u200d\\ufeff\\u2060\\u00ad\\u2061-\\u2064\\u180e\\u200e\\u200f\\u202a-\\u202e\\u2066-\\u2069]"
      - "(?:base64|atob|btoa)\\s*[:(].*(?:ignore|override|execute|eval|system|prompt)"
      - "<!--.*(?:ignore|override|execute).*-->"
      - "\\\\u[0-9a-fA-F]{4}.*(?:ignore|execute|override)"

  # -- Dangerous Operation --
  - id: PI-006
    name: dangerous_operation
    severity: CRITICAL
    patterns:
      - "(?:execute|run|eval)\\s*[:(\"'].*(?:rm |del |drop |format |shutdown|kill)"
      - "sudo\\s+rm\\s+-rf"
      - "(?:curl|wget|fetch)\\s+.{0,50}\\|\\s*(?:sh|bash|zsh|python)"
      - "os\\.(?:system|popen|exec)\\s*\\(.*(?:rm |del |drop |curl|wget|eval)"
      - "subprocess\\.(?:call|run|Popen)\\s*\\(.*(?:rm |del |drop |curl.*\\||wget.*\\|)"
      - "(?:exec|eval|compile)\\s*\\(.*(?:import|__)"
      - "base64\\s+(?:-d|-D|--decode)\\s*\\|\\s*(?:sh|bash|zsh|python|perl)"
      - "echo\\s+['\"][A-Za-z0-9+/=]{20,}['\"]\\s*\\|\\s*(?:base64|openssl)"

  # -- Social Engineering Injection --
  - id: PI-007
    name: social_engineering_injection
    severity: MEDIUM
    patterns:
      - "(?:尊敬的|亲爱的|Dear).*(?:忽略|无视|跳过|ignore|disregard).*(?:安全|限制|规则|safety|restriction)"
      - "(?:紧急|urgent|emergency).*(?:必须|must|need to).*(?:执行|execute|run)"
      - "(?:as (?:an?|the) )(?:administrator|admin|developer|root|owner).{0,30}(?:I )?(?:authorize|grant|permit|allow) (?:you|this|access)"
      - "(?:this is|I am) (?:an? )?(?:authorized|official|legitimate) (?:test|request|command).{0,30}(?:ignore|override|bypass|skip)"
      # Extended: manipulative language (from skill-scan prompt_analyzer Pass 9)
      - "(?:if\\s+you\\s+don'?t|unless\\s+you)\\s+(?:do\\s+this|comply|follow|obey)"
      - "(?:between\\s+us|our\\s+(?:little\\s+)?secret|nobody\\s+(?:needs?\\s+to|will)\\s+know)"

  # ============================================================
  # New rules from skill-scan-1.0.0 dangerous-patterns.json
  # ============================================================

  # -- Credential Access (source: CRED_ACCESS, languages: "*") --
  - id: PI-008
    name: credential_access
    severity: HIGH
    patterns:
      - "(?:read|access|open|cat|load|parse)\\s*\\(?[^)]*(?:credentials?\\.json|auth[_-]profiles?\\.json)"
      - "(?:read|access|open|cat|load)\\s*\\(?[^)]*\\.ssh/"
      - "(?:read|access|open|cat|load)\\s*\\(?[^)]*\\.aws/"
      - "\\b(?:OPENAI_API_KEY|ANTHROPIC_API_KEY|GOOGLE_API_KEY|AZURE_API_KEY)\\b"
      - "\\bbearer\\s+token\\b"
      - "\\b(?:botToken|authToken)\\s*[=:]"

  # -- Network Exfiltration Indicators (source: NETWORK_EXFIL, languages: "*") --
  - id: PI-009
    name: network_exfiltration
    severity: MEDIUM
    patterns:
      - "\\bwebhooks?\\b"
      - "\\bngrok\\b"
      - "\\bnslookup\\b"
      - "\\bdns\\.resolve\\b"
      - "\\breverse\\s+shell\\b"

  # -- Filesystem Destruction (source: FS_WRITE, languages: "*") --
  - id: PI-010
    name: filesystem_destruction
    severity: HIGH
    patterns:
      - "\\brm\\s+-[a-zA-Z]*r[a-zA-Z]*f\\b"
      - "\\bshutil\\.rmtree\\b"
      - "\\bos\\.(?:remove|unlink)\\s*\\("
      - "\\bfs\\.(?:unlink|rm|rmdir)(?:Sync)?\\s*\\("

  # -- Obfuscation Standalone (source: OBFUSCATION, languages: "*") --
  - id: PI-011
    name: obfuscation_standalone
    severity: MEDIUM
    patterns:
      - "\\bfromCharCode\\b"
      - "\\bdecodeURIComponent\\s*\\("
      - "\\bunescape\\s*\\("
      - "\\bbase64\\.b64decode\\b"
      - "\\bbase64\\.decodebytes\\b"
      - "Buffer\\.from\\s*\\([^)]*['\"]base64['\"]"

  # -- Crypto Wallet Access (source: CRYPTO_WALLET, languages: "*") --
  - id: PI-012
    name: crypto_wallet_access
    severity: HIGH
    patterns:
      - "\\bwallet\\.dat\\b"
      - "\\bseed[_-]?phrase\\b"
      - "\\bethers\\.Wallet\\b"
      - "\\bweb3\\.eth\\.accounts\\b"
      - "\\b(?:bip39|bip32)\\b"
      - "\\bsolana.*keypair\\b"

  # -- Persistence Mechanism (source: PERSISTENCE, languages: "*") --
  - id: PI-013
    name: persistence_mechanism
    severity: HIGH
    patterns:
      - "\\bcrontab\\b"
      - "\\bsystemctl\\s+(?:enable|start)\\b"
      - "\\bLaunchAgent\\b"
      - "\\blaunchd\\b"
      - "\\brc\\.local\\b"
      - "\\bpm2\\s+start\\b"

  # -- Privilege Escalation (source: PRIV_ESCALATION, languages: "*") --
  - id: PI-014
    name: privilege_escalation
    severity: HIGH
    patterns:
      - "\\bchmod\\s+\\+s\\b"
      - "\\bsetuid\\b"
      - "\\bsetgid\\b"
      - "/etc/shadow"
      - "/etc/sudoers"
      - "\\bNOPASSWD\\b"
